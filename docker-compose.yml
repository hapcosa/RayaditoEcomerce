# Servicios locales de desarrollo: PostgreSQL + pgAdmin.
# Las credenciales se toman de .env (ver .env.example). No usar en producción.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rayadito}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rayadito}
      POSTGRES_DB: ${DB_NAME:-piedrasrayadito}
    ports:
      - "${DB_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rayadito} -d ${DB_NAME:-piedrasrayadito}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@rayadito.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "8888:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: